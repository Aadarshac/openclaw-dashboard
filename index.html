<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Command Center</title>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #232733; --border: #2d3141;
  --text: #e4e4e7; --text2: #9ca3af;
  --blue: #3b82f6; --green: #22c55e; --orange: #f59e0b; --red: #ef4444;
  --purple: #a855f7; --teal: #14b8a6; --pink: #ec4899;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.topbar { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.topbar h1 { font-size:18px; font-weight:700; }
.topbar h1 span { color:var(--blue); }
.topbar-right { display:flex; align-items:center; gap:12px; }
.status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.status-dot.on { background:var(--green); box-shadow:0 0 6px var(--green); }
.status-text { font-size:12px; color:var(--text2); }

.tabs { display:flex; background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; overflow-x:auto; }
.tab { padding:10px 18px; font-size:13px; font-weight:500; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--blue); border-color:var(--blue); }

.content { padding:20px 24px; max-width:1400px; margin:0 auto; }
.hidden { display:none !important; }

/* Metrics */
.metrics { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; margin-bottom:24px; }
.metric { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
.metric .val { font-size:32px; font-weight:700; }
.metric .lbl { font-size:11px; color:var(--text2); margin-top:2px; text-transform:uppercase; letter-spacing:.5px; }

/* Cards */
.card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:12px; }
.card:hover { border-color:rgba(59,130,246,.4); }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:12px; }

/* Agent cards */
.agent-card { position:relative; padding-left:20px; }
.agent-card .bar { position:absolute; left:0; top:0; width:4px; height:100%; border-radius:10px 0 0 10px; }
.agent-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.agent-name { font-size:15px; font-weight:600; }
.agent-id { font-size:11px; color:var(--text2); font-family:monospace; }
.badge { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; text-transform:uppercase; letter-spacing:.3px; }
.badge-active { background:rgba(34,197,94,.12); color:var(--green); }
.badge-idle { background:rgba(156,163,175,.12); color:var(--text2); }
.agent-stats { display:flex; gap:14px; margin:8px 0; font-size:12px; color:var(--text2); }
.agent-stats span { display:flex; align-items:center; gap:3px; }
.agent-skills { display:flex; gap:4px; flex-wrap:wrap; margin:6px 0; }
.skill-tag { font-size:10px; padding:2px 6px; border-radius:4px; background:var(--surface2); color:var(--text2); border:1px solid var(--border); }
.agent-actions { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }

/* Buttons */
.btn { font-size:11px; padding:4px 10px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); cursor:pointer; font-weight:500; transition:.15s; }
.btn:hover { background:var(--blue); border-color:var(--blue); color:#fff; }
.btn-sm { padding:3px 8px; font-size:10px; }
.btn-primary { background:var(--blue); border-color:var(--blue); color:#fff; }
.btn-danger { color:var(--red); border-color:rgba(239,68,68,.3); }
.btn-danger:hover { background:var(--red); color:#fff; }

/* Kanban */
.kanban { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
.kanban-col { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px; min-height:200px; }
.col-head { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.col-count { background:var(--surface2); padding:1px 6px; border-radius:8px; font-size:10px; color:var(--text2); }
.issue-card { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:8px 10px; margin-bottom:6px; font-size:11px; cursor:pointer; transition:.15s; }
.issue-card:hover { border-color:var(--blue); }
.issue-title { font-weight:500; margin-bottom:3px; line-height:1.3; }
.issue-meta { color:var(--text2); font-size:10px; }
.issue-labels { display:flex; gap:3px; flex-wrap:wrap; margin-top:4px; }
.issue-label { font-size:9px; padding:1px 5px; border-radius:3px; }

/* Cron table */
table { width:100%; border-collapse:collapse; font-size:12px; }
th { text-align:left; padding:8px 10px; font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--text2); border-bottom:1px solid var(--border); }
td { padding:8px 10px; border-bottom:1px solid var(--border); }
tr:hover { background:var(--surface2); }
code { font-family:'SF Mono',Consolas,monospace; font-size:11px; background:var(--surface2); padding:1px 4px; border-radius:3px; }

/* Section */
.section { margin-bottom:24px; }
.section-head { font-size:13px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:6px; }

/* Modal */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200; align-items:center; justify-content:center; }
.overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; width:460px; max-width:92vw; }
.modal h2 { font-size:15px; font-weight:600; margin-bottom:16px; }
.modal label { font-size:11px; color:var(--text2); display:block; margin:10px 0 3px; }
.modal input, .modal textarea, .modal select { width:100%; padding:7px 10px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px; font-family:inherit; }
.modal textarea { resize:vertical; min-height:70px; }
.modal-foot { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }

/* Responsive */
@media(max-width:1000px) { .kanban { grid-template-columns:repeat(3,1fr); } }
@media(max-width:700px) { .kanban { grid-template-columns:1fr 1fr; } .grid { grid-template-columns:1fr; } .content { padding:12px; } }

.toast { position:fixed; bottom:16px; right:16px; background:var(--surface); border:1px solid var(--green); color:var(--green); padding:8px 14px; border-radius:6px; font-size:12px; z-index:300; animation:fadeUp .3s; }
@keyframes fadeUp { from{transform:translateY(12px);opacity:0} to{transform:translateY(0);opacity:1} }

::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>// Atlas <span>Command Center</span></h1>
  <div class="topbar-right">
    <span class="status-dot on" id="dot"></span>
    <span class="status-text" id="status-text">Loading...</span>
    <button class="btn" onclick="refreshAll()" title="Refresh">Refresh</button>
  </div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-t="overview">Overview</div>
  <div class="tab" data-t="agents">Agents</div>
  <div class="tab" data-t="pipeline">Pipeline</div>
  <div class="tab" data-t="crons">Crons</div>
  <div class="tab" data-t="convos">Conversations</div>
</div>

<div class="content">
  <div id="view-overview"></div>
  <div id="view-agents" class="hidden"></div>
  <div id="view-pipeline" class="hidden"></div>
  <div id="view-crons" class="hidden"></div>
  <div id="view-convos" class="hidden"></div>
</div>

<!-- Message Modal -->
<div class="overlay" id="modal-msg">
  <div class="modal">
    <h2>// Send Message</h2>
    <label>Agent</label><select id="msg-agent"></select>
    <label>Message</label><textarea id="msg-text" placeholder="Type instruction..."></textarea>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doSendMsg()">Send</button>
    </div>
  </div>
</div>

<!-- Task Modal -->
<div class="overlay" id="modal-task">
  <div class="modal">
    <h2>// Assign Task</h2>
    <label>Agent</label><select id="task-agent"></select>
    <label>Task</label><textarea id="task-text" placeholder="Describe the task..."></textarea>
    <label>Priority</label>
    <select id="task-pri"><option value="normal">Normal</option><option value="high">High</option><option value="critical">Critical</option></select>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doAssignTask()">Assign</button>
    </div>
  </div>
</div>

<script>
// ---- Config ----
const API = '';  // same origin
const COLORS = {
  'main':'#3b82f6','seif-agent':'#22c55e','omar-agent':'#f59e0b',
  'mtgl-v1-agent':'#ef4444','mtgl-v2-agent':'#a855f7',
  'marketing-agent':'#ec4899','qa-forensics-agent':'#14b8a6'
};
const color = id => COLORS[id]||'#6b7280';

// ---- State ----
let S = { agents:[], crons:[], sessions:[], issues:[], counts:{} };

// ---- Fetch ----
async function api(path) {
  try {
    const r = await fetch(API+path);
    return await r.json();
  } catch(e) { console.error(path,e); return null; }
}

async function refreshAll() {
  document.getElementById('status-text').textContent = 'Refreshing...';
  const [overview, issues] = await Promise.all([api('/api/overview'), api('/api/issues')]);
  if (overview) { S.agents = overview.agents; S.crons = overview.crons; S.sessions = overview.sessions; S.counts = overview.counts; }
  if (Array.isArray(issues)) S.issues = issues;
  document.getElementById('dot').className = 'status-dot on';
  document.getElementById('status-text').textContent = `${S.agents.length} agents | ${S.counts.activeCrons||0} crons active | ${S.issues.length} issues`;
  renderCurrentTab();
}

// ---- Tabs ----
let currentTab = 'overview';
document.getElementById('tabs').addEventListener('click', e => {
  if (!e.target.dataset.t) return;
  currentTab = e.target.dataset.t;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.t === currentTab));
  ['overview','agents','pipeline','crons','convos'].forEach(v => document.getElementById('view-'+v).classList.toggle('hidden', v !== currentTab));
  renderCurrentTab();
});

function renderCurrentTab() {
  ({overview:renderOverview, agents:renderAgents, pipeline:renderPipeline, crons:renderCrons, convos:renderConvos})[currentTab]();
}

// ---- Agent helpers ----
function agentCrons(id) { return S.crons.filter(c => c.agentId === id); }
function agentIssues(id) {
  const map = {'marketing-agent':['nadia'],'qa-forensics-agent':['QA','bug','forensic'],'main':['atlas-roadmap','agent-infra']};
  const tags = map[id]||[];
  return S.issues.filter(i => {
    const lbl = (i.labels||[]).join(' ').toLowerCase();
    return tags.some(t => lbl.includes(t.toLowerCase())) || (i.assignee||'') === id.replace('-agent','');
  });
}
function hasSession(id) { return S.sessions.some(s => (s.agentId||'') === id || (s.key||'').includes(id)); }

// ---- Render: Overview ----
function renderOverview() {
  const el = document.getElementById('view-overview');
  const m = S.counts;
  el.innerHTML = `
    <div class="metrics">
      <div class="metric"><div class="val" style="color:var(--blue)">${m.agents||0}</div><div class="lbl">Agents</div></div>
      <div class="metric"><div class="val" style="color:var(--green)">${m.sessions||0}</div><div class="lbl">Sessions</div></div>
      <div class="metric"><div class="val" style="color:var(--orange)">${m.activeCrons||0}</div><div class="lbl">Active Crons</div></div>
      <div class="metric"><div class="val" style="color:var(--purple)">${S.issues.length}</div><div class="lbl">Open Issues</div></div>
    </div>
    <div class="section">
      <div class="section-head">Agents</div>
      <div class="grid">${S.agents.map(agentCard).join('')}</div>
    </div>
    <div class="section">
      <div class="section-head">Upcoming Crons</div>
      ${cronMiniTable(S.crons.filter(c=>c.enabled&&c.state?.nextRunAtMs).sort((a,b)=>a.state.nextRunAtMs-b.state.nextRunAtMs).slice(0,6))}
    </div>
  `;
}

function agentCard(a) {
  const c = color(a.id);
  const active = hasSession(a.id);
  const nc = agentCrons(a.id).length;
  const ni = agentIssues(a.id).length;
  return `
  <div class="card agent-card">
    <div class="bar" style="background:${c}"></div>
    <div class="agent-header">
      <div><div class="agent-name">${a.name}</div><div class="agent-id">${a.id}</div></div>
      <span class="badge ${active?'badge-active':'badge-idle'}">${active?'ACTIVE':'IDLE'}</span>
    </div>
    <div class="agent-stats">
      <span>${nc} crons</span>
      <span>${ni} issues</span>
      <span>${a.toolsProfile}</span>
    </div>
    <div class="agent-skills">${a.skills.map(s=>`<span class="skill-tag">${s}</span>`).join('')||'<span class="skill-tag">default</span>'}</div>
    <div class="agent-actions">
      <button class="btn btn-sm" onclick="openMsg('${a.id}')">Message</button>
      <button class="btn btn-sm" onclick="openTask('${a.id}')">Assign Task</button>
    </div>
  </div>`;
}

// ---- Render: Agents detail ----
function renderAgents() {
  document.getElementById('view-agents').innerHTML = `<div class="grid">${S.agents.map(a => {
    const c = color(a.id);
    const crons = agentCrons(a.id);
    const issues = agentIssues(a.id);
    return `
    <div class="card agent-card">
      <div class="bar" style="background:${c}"></div>
      <div class="agent-header">
        <div><div class="agent-name">${a.name}</div><div class="agent-id">${a.id}</div></div>
        <span class="badge ${hasSession(a.id)?'badge-active':'badge-idle'}">${hasSession(a.id)?'ACTIVE':'IDLE'}</span>
      </div>
      <div class="agent-stats"><span>Workspace: <code>${a.workspace}</code></span></div>
      <div class="agent-skills">${a.skills.map(s=>`<span class="skill-tag">${s}</span>`).join('')||'<span class="skill-tag">default</span>'}</div>
      <div class="section-head" style="margin-top:10px;font-size:11px">Crons (${crons.length})</div>
      ${crons.length ? `<div style="font-size:11px">${crons.map(c=>`<div style="margin:3px 0;color:var(--text2)"><code>${c.schedule?.expr||'-'}</code> ${c.name||c.id?.substring(0,8)} <span class="badge ${c.enabled?'badge-active':'badge-idle'}" style="font-size:9px">${c.enabled?'ON':'OFF'}</span></div>`).join('')}</div>` : '<div style="font-size:11px;color:var(--text2)">No crons</div>'}
      <div class="section-head" style="margin-top:10px;font-size:11px">Issues (${issues.length})</div>
      ${issues.length ? `<div style="font-size:11px">${issues.slice(0,5).map(i=>`<div style="margin:3px 0"><a href="${i.webUrl}" target="_blank" style="color:var(--blue);text-decoration:none">#${i.iid}</a> ${i.title.substring(0,50)}</div>`).join('')}</div>` : '<div style="font-size:11px;color:var(--text2)">No assigned issues</div>'}
      <div class="agent-actions" style="margin-top:12px">
        <button class="btn btn-sm" onclick="openMsg('${a.id}')">Message</button>
        <button class="btn btn-sm" onclick="openTask('${a.id}')">Assign Task</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ---- Render: Pipeline (Kanban) ----
function renderPipeline() {
  const cols = [
    {key:'backlog',label:'Backlog',color:'var(--text2)'},
    {key:'todo',label:'To Do',color:'var(--blue)'},
    {key:'doing',label:'In Progress',color:'var(--orange)'},
    {key:'review',label:'Review',color:'var(--purple)'},
    {key:'done',label:'Done',color:'var(--green)'},
  ];
  const labelMap = {'Doing':'doing','To Do':'todo','Done':'done','needs-approval':'review'};
  const grouped = {}; cols.forEach(c=>grouped[c.key]=[]);
  S.issues.forEach(i => {
    let col='backlog';
    for(const l of (i.labels||[])) { if(labelMap[l]){col=labelMap[l];break;} }
    grouped[col].push(i);
  });
  document.getElementById('view-pipeline').innerHTML = `<div class="kanban">${cols.map(col=>{
    const items = grouped[col.key];
    return `<div class="kanban-col">
      <div class="col-head" style="color:${col.color}">${col.label}<span class="col-count">${items.length}</span></div>
      ${items.map(i=>`
        <div class="issue-card" onclick="window.open('${i.webUrl}','_blank')">
          <div class="issue-title">#${i.iid} ${i.title.substring(0,55)}</div>
          <div class="issue-meta">${i.project} ${i.assignee ? '| @'+i.assignee : ''}</div>
          <div class="issue-labels">${(i.labels||[]).slice(0,3).map(l=>`<span class="issue-label" style="background:var(--surface);border:1px solid var(--border)">${l}</span>`).join('')}</div>
        </div>`).join('')}
    </div>`;
  }).join('')}</div>`;
}

// ---- Render: Crons ----
function renderCrons() {
  document.getElementById('view-crons').innerHTML = `<div class="card"><table>
    <thead><tr><th>Name</th><th>Agent</th><th>Schedule</th><th>TZ</th><th>Next Run</th><th>Status</th></tr></thead>
    <tbody>${S.crons.map(c=>{
      const next = c.state?.nextRunAtMs ? new Date(c.state.nextRunAtMs).toLocaleString() : '-';
      return `<tr>
        <td><strong>${c.name||c.id?.substring(0,12)||'-'}</strong></td>
        <td style="color:${color(c.agentId||'main')}">${c.agentId||'main'}</td>
        <td><code>${c.schedule?.expr||c.schedule?.kind||'-'}</code></td>
        <td style="font-size:11px;color:var(--text2)">${c.schedule?.tz||'UTC'}</td>
        <td style="font-size:11px">${next}</td>
        <td><span class="badge ${c.enabled?'badge-active':'badge-idle'}">${c.enabled?'ENABLED':'OFF'}</span></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function cronMiniTable(list) {
  if(!list.length) return '<div class="card" style="font-size:12px;color:var(--text2)">No upcoming crons</div>';
  return `<div class="card"><table>
    <thead><tr><th>Name</th><th>Agent</th><th>Next Run</th></tr></thead>
    <tbody>${list.map(c=>`<tr>
      <td>${c.name||c.id?.substring(0,12)}</td>
      <td style="color:${color(c.agentId||'main')}">${c.agentId||'main'}</td>
      <td style="font-size:11px">${new Date(c.state.nextRunAtMs).toLocaleString()}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

// ---- Modals ----
function closeModal() { document.querySelectorAll('.overlay').forEach(m=>m.classList.remove('open')); }
function populateSelect(selId) { document.getElementById(selId).innerHTML = S.agents.map(a=>`<option value="${a.id}">${a.name}</option>`).join(''); }
function openMsg(agentId) { populateSelect('msg-agent'); document.getElementById('msg-agent').value=agentId; document.getElementById('modal-msg').classList.add('open'); }
function openTask(agentId) { populateSelect('task-agent'); document.getElementById('task-agent').value=agentId; document.getElementById('modal-task').classList.add('open'); }

async function doSendMsg() {
  const agent = document.getElementById('msg-agent').value;
  const text = document.getElementById('msg-text').value;
  if(!text) return;
  // Send via Atlas main session relay
  toast('Sending to '+agent+'...');
  // For now, POST is not wired — show instruction
  toast('Use WhatsApp: "message '+agent+': '+text.substring(0,40)+'..."');
  closeModal(); document.getElementById('msg-text').value='';
}

async function doAssignTask() {
  const agent = document.getElementById('task-agent').value;
  const text = document.getElementById('task-text').value;
  const pri = document.getElementById('task-pri').value;
  if(!text) return;
  toast('Task queued for '+agent);
  closeModal(); document.getElementById('task-text').value='';
}

function toast(msg) {
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
}

document.querySelectorAll('.overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModal()}));

// ---- Render: Conversations ----
let convoAgent = 'main';

async function renderConvos() {
  const el = document.getElementById('view-convos');
  el.innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap">
      <span style="font-size:12px;color:var(--text2)">Agent:</span>
      ${S.agents.map(a=>`<button class="btn btn-sm ${a.id===convoAgent?'btn-primary':''}" onclick="switchConvoAgent('${a.id}')" style="border-left:3px solid ${color(a.id)}">${a.name}</button>`).join('')}
    </div>
    <div id="convo-body" style="color:var(--text2);font-size:12px">Loading conversations...</div>
  `;
  loadConvo();
}

async function switchConvoAgent(id) {
  convoAgent = id;
  renderConvos();
}

async function loadConvo() {
  const data = await api('/api/conversations?agent='+convoAgent+'&limit=40');
  const body = document.getElementById('convo-body');
  if (!data || !data.sessions || data.sessions.length === 0) {
    body.innerHTML = '<div class="card" style="color:var(--text2);font-size:13px">No conversations found for this agent.</div>';
    return;
  }
  body.innerHTML = data.sessions.map(sess => {
    const label = sess.key.replace('agent:'+convoAgent+':', '');
    const time = sess.updatedAt ? new Date(sess.updatedAt).toLocaleString() : '';
    return `
    <details class="card" style="cursor:pointer;padding:0">
      <summary style="padding:12px 16px;font-size:12px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <span style="font-weight:600;color:var(--text)">${escHtml(label)}</span>
          <span style="margin-left:8px;font-size:10px;color:var(--text2)">${sess.messageCount} msgs</span>
        </div>
        <span style="font-size:10px;color:var(--text2)">${time}</span>
      </summary>
      <div style="padding:0 16px 14px;max-height:500px;overflow-y:auto">
        ${sess.messages.map(m => `
          <div style="margin:6px 0;display:flex;gap:8px">
            <div style="min-width:60px;font-size:10px;font-weight:600;padding-top:2px;color:${m.role==='user'?'var(--blue)':'var(--green)'}">${m.role==='user'?'USER':'AGENT'}</div>
            <div style="font-size:12px;line-height:1.5;color:var(--text);flex:1;word-break:break-word;white-space:pre-wrap">${escHtml(m.text)}</div>
          </div>
        `).join('<div style="border-top:1px solid var(--border);margin:4px 60px 4px 68px"></div>')}
      </div>
    </details>`;
  }).join('');
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ---- Init ----
refreshAll();
setInterval(refreshAll, 30000);
</script>
</body>
</html>
